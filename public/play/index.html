<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
  <title>MusicAxis · play</title>
  <meta name="color-scheme" content="dark" />
  <meta name="theme-color" content="#0b0a08" />
  <link rel="stylesheet" href="/assets/play.css" />
</head>
<body>
  <p id="fatal" class="hint" hidden style="margin:0;padding:12px 16px;background:#3a1712;color:#ffd7cf;border-bottom:1px solid #6a2b22;"></p>
  <section id="gate" class="screen">
    <h1>MusicAxis</h1>
    <p class="s">session <b id="sid">—</b></p>
    <button id="go">Start</button>
    <p class="hint" id="gate-hint">tap once to enable motion + sound</p>
  </section>

  <section id="pad" class="screen pad" hidden>
    <p class="octave" id="oct">oct —</p>
    <p class="note" id="note">—</p>
    <div class="strip" id="strip"></div>
    <p class="hint">rotate phone L/R to pick note · tap anywhere to play · tilt forward = +octave</p>
    <button id="recenter" class="mini">⟲ recenter</button>
    <footer>
      <span id="sdot"></span>
      <span id="stext">idle</span>
      <span class="sp"></span>
      <span class="mono" id="ro">α — · β — · γ —</span>
    </footer>
  </section>

  <script src="/assets/play.js"></script>
</body>
</html>
