<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
  <title>MusicAxis · play</title>
  <meta name="color-scheme" content="dark" />
  <meta name="theme-color" content="#0b0a08" />
  <link rel="stylesheet" href="/assets/play.css" />
</head>
<body>
  <h1>MusicAxis</h1>

  <section id="ios" hidden>
    <p>iOS needs motion permission</p>
    <button id="btn-enable">Enable motion</button>
  </section>

  <section id="connect" hidden>
    <p>session <b id="sid">—</b></p>
    <button id="btn-join">Connect</button>
  </section>

  <section id="live" hidden>
    <div id="dot"></div>
    <p class="hints">
      tilt L/R · pitch<br>
      tilt forward · louder<br>
      rotate · reverb
    </p>
    <button id="btn-tap">Tap note</button>
  </section>

  <section id="err" hidden>
    <p>open the stage on a laptop and scan the QR with your phone.</p>
  </section>

  <footer>
    <span id="sdot"></span>
    <span id="stext">idle</span>
  </footer>

  <div class="readout" id="ro" hidden>
    α <b id="ra">—</b> · β <b id="rb">—</b> · γ <b id="rg">—</b>
  </div>

  <script src="/assets/play.js"></script>
</body>
</html>
