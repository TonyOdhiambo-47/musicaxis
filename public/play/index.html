<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
  <title>MusicAxis · play</title>
  <meta name="color-scheme" content="dark" />
  <meta name="theme-color" content="#0b0a08" />
  <link rel="stylesheet" href="/assets/play.css" />
</head>
<body>
  <section id="gate" class="screen">
    <h1>MusicAxis</h1>
    <p class="s">session <b id="sid">—</b></p>
    <button id="go">Start</button>
    <p class="hint" id="gate-hint">tap once to enable motion + sound</p>
  </section>

  <section id="pad" class="screen pad" hidden>
    <div class="ring"><div class="dot" id="dot"></div></div>
    <p class="note" id="note">—</p>
    <p class="hint">tap anywhere · hold + rotate to slide</p>
    <footer>
      <span id="sdot"></span>
      <span id="stext">idle</span>
      <span class="sp"></span>
      <span class="mono" id="ro">α — · β — · γ —</span>
    </footer>
  </section>

  <script src="/assets/play.js"></script>
</body>
</html>
